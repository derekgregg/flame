<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Le Directeur</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1><img src="/favicon.svg" alt="" class="header-icon"> LE DIRECTEUR</h1>
      <p>Your brutally honest directeur sportif</p>
    </header>

    <nav id="user-nav" class="user-nav hidden">
      <span id="user-greeting"></span>
      <a href="/upload.html" class="nav-link">Add Activity</a>
      <a href="/settings.html" class="nav-link">Settings</a>
    </nav>
    <div id="controls" class="controls">
      <select id="filter-user">
        <option value="">All Athletes</option>
      </select>
      <select id="filter-sport">
        <option value="">All Sports</option>
        <option value="Ride">Ride</option>
        <option value="Run">Run</option>
        <option value="Walk">Walk</option>
        <option value="Hike">Hike</option>
        <option value="Swim">Swim</option>
        <option value="WeightTraining">Weights</option>
      </select>
      <select id="sort-by">
        <option value="start_date">Newest</option>
        <option value="distance">Distance</option>
        <option value="average_speed">Speed</option>
        <option value="moving_time">Duration</option>
        <option value="elevation_gain">Elevation</option>
      </select>
      <a href="/api/google-auth" id="login-link" class="login-link" style="margin-left: auto;">Sign In</a>
    </div>

    <div id="leaderboard">
      <div class="loading">Loading commentary...</div>
    </div>


    <footer>
      <div id="strava-logo" class="footer-logos hidden">
        <a href="https://www.strava.com" target="_blank" rel="noopener">
          <img src="/images/api_logo_pwrdBy_strava_horiz_white.svg" alt="Powered by Strava">
        </a>
      </div>
      <a href="/privacy.html" class="footer-link">Privacy Policy</a>
      <span class="footer-sep">·</span>
      <a href="#" class="footer-link" data-feedback="bug">Report a Bug</a>
      <span class="footer-sep">·</span>
      <a href="#" class="footer-link" data-feedback="feature">Request a Feature</a>
    </footer>

    <div id="feedback-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="feedback-heading">Report a Bug</h3>
        <div class="settings-field">
          <label for="feedback-title" id="feedback-title-label">What went wrong?</label>
          <input type="text" id="feedback-title" placeholder="">
        </div>
        <div class="settings-field">
          <label for="feedback-description">Details <span class="text-muted">(optional)</span></label>
          <textarea id="feedback-description" rows="3" placeholder=""></textarea>
        </div>
        <div class="modal-actions">
          <button id="feedback-submit" class="connect-btn">Submit</button>
          <button id="feedback-cancel" class="connect-btn" style="background: var(--surface); border: 1px solid var(--border);">Cancel</button>
        </div>
        <div id="feedback-status"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
